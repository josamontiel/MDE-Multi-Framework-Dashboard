<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDE Multi-Framework Audit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ── */
:root[data-theme="dark"] {
  --bg0: #080c12;
  --bg1: #0e1420;
  --bg2: #131c2e;
  --bg3: #1a243a;
  --bg4: #1f2d45;
  --border: #243047;
  --border2: #2d3d5a;
  --t1: #e8eef8;
  --t2: #8fa3c0;
  --t3: #4e6280;
  --t4: #2d3d5a;
  --shadow: 0 6px 32px rgba(0,0,0,.55);
  --shadow-sm: 0 2px 10px rgba(0,0,0,.4);
  --glow: 0 0 0 1px rgba(255,255,255,.04);
  --s-complete:#10b981; --s-complete-bg:rgba(16,185,129,.08);
  --s-progress:#f59e0b; --s-progress-bg:rgba(245,158,11,.08);
  --s-blocked:#ef4444;  --s-blocked-bg:rgba(239,68,68,.08);
  --s-pending:#4e6280;  --s-pending-bg:transparent;
  --p-high:#f87171; --p-high-bg:rgba(248,113,113,.1);
  --p-med:#fbbf24;  --p-med-bg:rgba(251,191,36,.1);
  --p-low:#34d399;  --p-low-bg:rgba(52,211,153,.1);
}
:root[data-theme="light"] {
  --bg0: #edf1f7;
  --bg1: #f4f7fb;
  --bg2: #ffffff;
  --bg3: #f0f4fa;
  --bg4: #e8edf5;
  --border: #d0d9e8;
  --border2: #c0cde0;
  --t1: #0f172a;
  --t2: #475569;
  --t3: #94a3b8;
  --t4: #cbd5e1;
  --shadow: 0 6px 32px rgba(0,0,0,.08);
  --shadow-sm: 0 2px 10px rgba(0,0,0,.05);
  --glow: 0 0 0 1px rgba(0,0,0,.04);
  --s-complete:#059669; --s-complete-bg:rgba(5,150,105,.07);
  --s-progress:#d97706; --s-progress-bg:rgba(217,119,6,.07);
  --s-blocked:#dc2626;  --s-blocked-bg:rgba(220,38,38,.07);
  --s-pending:#94a3b8;  --s-pending-bg:transparent;
  --p-high:#dc2626; --p-high-bg:rgba(220,38,38,.08);
  --p-med:#d97706;  --p-med-bg:rgba(217,119,6,.08);
  --p-low:#059669;  --p-low-bg:rgba(5,150,105,.08);
}

/* Framework colors */
:root {
  --csf-c:#0078D4; --csf-g:rgba(0,120,212,.12);
  --ce-c:#16a34a;  --ce-g:rgba(22,163,74,.12);
  --soc-c:#7c3aed; --soc-g:rgba(124,58,237,.12);
  --n53-c:#ea580c; --n53-g:rgba(234,88,12,.12);
}

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg0);
  color:var(--t1);
  min-height:100vh;
  font-size:13.5px;
  line-height:1.6;
  transition:background .25s,color .25s;
}

/* ── HEADER ── */
header{
  background:var(--bg1);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.hdr{
  max-width:1600px;margin:0 auto;
  padding:0 24px;height:56px;
  display:flex;align-items:center;gap:12px;
}
.hdr-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.hdr-logo-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--fw-color,#0078D4) 0%,color-mix(in srgb,var(--fw-color,#0078D4) 60%,#000) 100%);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:background .3s;
}
.hdr-brand{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.hdr-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-top:-2px}

/* Framework switcher */
.fw-switcher{
  display:flex;align-items:center;gap:3px;
  background:var(--bg0);
  border:1px solid var(--border);
  border-radius:9px;padding:3px;
  flex-shrink:0;
}
.fw-btn{
  padding:5px 12px;
  border-radius:6px;border:none;
  background:transparent;
  color:var(--t3);
  font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all .18s;
  display:flex;align-items:center;gap:5px;
}
.fw-btn .fw-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fw-btn:hover{background:var(--bg2);color:var(--t2)}
.fw-btn.active{background:var(--bg2);color:var(--t1);box-shadow:var(--shadow-sm)}
.fw-btn.active .fw-dot{box-shadow:0 0 0 2px color-mix(in srgb,var(--dot-color,#888) 40%,transparent)}

.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--t2);font-family:'DM Sans',sans-serif;
  font-size:11.5px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap;
}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--fw-color,#0078D4)}
.btn-accent{background:var(--fw-color,#0078D4);color:#fff;border-color:var(--fw-color,#0078D4)}
.btn-accent:hover{filter:brightness(1.12);color:#fff}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;font-size:14px}

/* ── MAIN ── */
.main{max-width:1600px;margin:0 auto;padding:22px 24px 60px}

/* ── OVERVIEW PAGE ── */
.ov-page{}
.ov-page-title{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  color:var(--t1);margin-bottom:4px;
}
.ov-page-sub{font-size:12px;color:var(--t3);margin-bottom:20px}

.fw-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.fw-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
}
.fw-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-color);
}
.fw-card:hover{border-color:var(--card-color);transform:translateY(-1px);box-shadow:var(--shadow)}
.fw-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.fw-card-id{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  color:var(--card-color);margin-bottom:4px;
}
.fw-card-name{font-size:15px;font-weight:700;color:var(--t1)}
.fw-card-desc{font-size:11.5px;color:var(--t3);line-height:1.45;margin-top:3px}
.fw-card-pct{
  font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;
  color:var(--card-color);flex-shrink:0;
}
.fw-card-pct-label{font-size:9px;color:var(--t3);text-align:right;text-transform:uppercase;letter-spacing:.5px}
.fw-prog{height:4px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.fw-prog-fill{height:100%;border-radius:3px;background:var(--card-color);transition:width .6s cubic-bezier(.4,0,.2,1)}
.fw-stat-row{display:flex;gap:12px;margin-top:14px}
.fw-stat{text-align:center}
.fw-stat-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.fw-stat-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* Cross-framework table */
.cross-table-wrap{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  margin-bottom:28px;
}
.cross-table-hdr{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cross-table-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t1)}
table.cross-tbl{width:100%;border-collapse:collapse}
table.cross-tbl th{
  padding:9px 14px;font-size:10px;font-weight:600;
  letter-spacing:.7px;text-transform:uppercase;color:var(--t3);
  border-bottom:1px solid var(--border);text-align:left;
  background:var(--bg1);
}
table.cross-tbl td{
  padding:10px 14px;font-size:12px;
  border-bottom:1px solid var(--border);vertical-align:middle;
}
table.cross-tbl tr:last-child td{border-bottom:none}
table.cross-tbl tbody tr:hover td{background:var(--bg3)}
.fw-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:5px;
}

/* ── FRAMEWORK VIEW ── */
.fw-view{display:none}
.fw-view.active{display:block}

.fw-view-header{
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg2);
  padding:18px 20px;
  margin-bottom:16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
}
.fw-view-tag{
  font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:5px;display:inline-block;margin-bottom:7px;
}
.fw-view-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t1);margin-bottom:3px}
.fw-view-desc{font-size:12px;color:var(--t2);max-width:680px;line-height:1.5}
.fw-view-stats{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.fw-stat-pill{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:9px 14px;text-align:center;min-width:64px;
}
.fw-stat-pill-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
.fw-stat-pill-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* Category tabs */
.cat-tabs{display:flex;gap:3px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;flex-wrap:nowrap}
.cat-tab{
  padding:7px 14px;border-radius:7px;border:1px solid transparent;
  background:transparent;color:var(--t3);
  font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .18s;
  display:flex;align-items:center;gap:5px;
}
.cat-tab:hover{background:var(--bg2);color:var(--t2)}
.cat-tab.active{background:var(--bg2);border-color:var(--border);color:var(--t1)}
.cat-tab-count{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  padding:1px 6px;border-radius:9px;background:var(--bg0);color:var(--t3);
}

/* Category section */
.cat-section{display:none}
.cat-section.active{display:block}
.cat-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px 18px;margin-bottom:12px;gap:14px;
}
.cat-hdr-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px;
}
.cat-hdr-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1);margin-bottom:3px}
.cat-hdr-desc{font-size:12px;color:var(--t3);max-width:600px;line-height:1.45}
.cat-hdr-pct{flex-shrink:0;text-align:right}
.cat-pct-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.cat-pct-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* Task rows */
.tasks-list{display:flex;flex-direction:column;gap:7px;margin-bottom:24px}
.task{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:13px 15px;
  display:grid;
  grid-template-columns:20px 1fr auto auto auto;
  align-items:start;gap:11px;
  transition:all .18s;position:relative;overflow:hidden;
}
.task::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;
  background:var(--fw-color,#0078D4);opacity:.5;border-radius:2px 0 0 2px;
}
.task:hover{background:var(--bg3);border-color:var(--fw-color,#0078D4)}
.task.done{opacity:.62}
.task.done .task-name{text-decoration:line-through;color:var(--t3)}
.task-cb{width:16px;height:16px;cursor:pointer;accent-color:var(--fw-color,#0078D4);margin-top:2px;flex-shrink:0}
.task-body{min-width:0}
.task-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px;line-height:1.35}
.task-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:4px}
.task-ref{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.4px;
  color:var(--t3);background:var(--bg0);padding:2px 7px;
  border-radius:4px;border:1px solid var(--border);
}
.task-desc{font-size:11.5px;color:var(--t2);line-height:1.4}
.task-status{
  padding:5px 9px;border-radius:5px;
  border:1px solid var(--border);background:var(--bg0);
  color:var(--t1);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;outline:none;transition:all .18s;min-width:118px;
}
.task-status:focus{border-color:var(--fw-color,#0078D4)}
.task-status.ss-complete{color:var(--s-complete);border-color:color-mix(in srgb,var(--s-complete) 40%,transparent);background:var(--s-complete-bg)}
.task-status.ss-progress{color:var(--s-progress);border-color:color-mix(in srgb,var(--s-progress) 40%,transparent);background:var(--s-progress-bg)}
.task-status.ss-blocked{color:var(--s-blocked);border-color:color-mix(in srgb,var(--s-blocked) 40%,transparent);background:var(--s-blocked-bg)}
.task-status.ss-pending{color:var(--t3)}
.pbadge{
  padding:3px 8px;border-radius:4px;font-size:9.5px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;align-self:start;
}
.pb-high{color:var(--p-high);background:var(--p-high-bg)}
.pb-med{color:var(--p-med);background:var(--p-med-bg)}
.pb-low{color:var(--p-low);background:var(--p-low-bg)}
.task-notes{
  width:100%;padding:5px 8px;border-radius:5px;
  border:1px solid var(--border);background:var(--bg0);color:var(--t1);
  font-family:'DM Sans',sans-serif;font-size:11px;
  resize:vertical;min-height:34px;outline:none;transition:border-color .18s;
  line-height:1.4;min-width:180px;max-width:260px;
}
.task-notes:focus{border-color:var(--fw-color,#0078D4)}
.task-notes::placeholder{color:var(--t4)}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:500;
  align-items:center;justify-content:center;backdrop-filter:blur(5px);
}
.overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:26px;max-width:600px;width:92%;
  box-shadow:var(--shadow);animation:modal-in .2s ease;
}
@keyframes modal-in{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-body{margin-bottom:18px}
.modal-body pre{
  background:var(--bg0);border:1px solid var(--border);border-radius:8px;
  padding:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--t2);max-height:340px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;
}
.modal-footer{display:flex;gap:7px;justify-content:flex-end}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.exp-card{
  background:var(--bg0);border:1px solid var(--border);border-radius:9px;
  padding:16px 12px;cursor:pointer;text-align:center;transition:all .18s;
}
.exp-card:hover{border-color:var(--fw-color,#0078D4);background:color-mix(in srgb,var(--fw-color,#0078D4) 6%,transparent)}
.exp-card-icon{font-size:20px;margin-bottom:7px}
.exp-card-label{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.exp-card-desc{font-size:10px;color:var(--t3)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:9px;
  padding:11px 17px;display:flex;align-items:center;gap:9px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:600;
  transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);
}
.toast.show{transform:translateY(0);opacity:1}

/* ── UTIL ── */
.hidden{display:none!important}

/* ══════════════════════════════════════
   RESPONSIVE — TABLET  (≤900px)
══════════════════════════════════════ */
@media (max-width: 900px) {
  /* Shrink fw-switcher labels */
  .fw-btn { padding: 5px 9px; font-size: 11px; }
  .fw-view-stats { flex-wrap: wrap; }
  .fw-stat-pill { min-width: 54px; padding: 7px 10px; }
  .fw-stat-pill-val { font-size: 15px; }
  /* Cross table scrollable */
  .cross-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.cross-tbl { min-width: 640px; }
}

/* ══════════════════════════════════════
   RESPONSIVE — MOBILE  (≤768px)
══════════════════════════════════════ */
@media (max-width: 768px) {

  /* ── Header: two-row layout ── */
  .hdr {
    flex-wrap: wrap;
    height: auto;
    padding: 10px 14px 0 14px;
    gap: 8px;
    align-items: center;
  }
  .hdr-logo { flex: 1; min-width: 0; }
  .hdr-right { flex-shrink: 0; }
  /* Hide subtitle on small screens */
  .hdr-sub { display: none; }
  /* Switcher fills full width on its own row */
  .fw-switcher {
    order: 3;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-radius: 8px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .fw-switcher::-webkit-scrollbar { display: none; }
  .fw-btn { padding: 6px 10px; font-size: 11px; flex-shrink: 0; }

  /* ── Main padding ── */
  .main { padding: 12px 12px 56px; }

  /* ── Overview page ── */
  .ov-page-title { font-size: 16px; }
  .fw-cards { grid-template-columns: 1fr; gap: 10px; }
  .fw-card { padding: 16px; }
  .fw-card-pct { font-size: 22px; }

  /* Cross-framework comparison table: horizontal scroll */
  .cross-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.cross-tbl { min-width: 580px; }

  /* ── Framework view header: stack vertically ── */
  .fw-view-header {
    flex-direction: column;
    gap: 14px;
    padding: 14px 14px;
  }
  .fw-view-name { font-size: 16px; }
  .fw-view-desc { font-size: 11.5px; }
  .fw-view-stats {
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 7px;
  }
  .fw-stat-pill { min-width: 52px; padding: 6px 9px; }
  .fw-stat-pill-val { font-size: 14px; }
  .fw-stat-pill-label { font-size: 8px; }

  /* ── Category header: stack on very small ── */
  .cat-hdr { flex-direction: column; gap: 8px; }
  .cat-hdr-pct { text-align: left; }
  .cat-hdr-title { font-size: 13px; }

  /* ── Category tabs: scrollable strip ── */
  .cat-tabs {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 6px;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab { padding: 6px 10px; font-size: 11px; flex-shrink: 0; }

  /* ── Task rows: mobile 2-col grid ── */
  .task {
    grid-template-columns: 20px 1fr;
    gap: 8px;
    padding: 12px 12px;
  }
  /* Checkbox: row 1, col 1 */
  .task-cb { grid-column: 1; grid-row: 1; margin-top: 3px; }
  /* Task body: row 1, col 2 */
  .task-body { grid-column: 2; grid-row: 1; }
  /* Status select: full-width row 2 */
  .task > select.task-status {
    grid-column: 1 / -1;
    grid-row: 2;
    min-width: 0;
    width: 100%;
  }
  /* Standalone priority badge: hide (already shown inside task-tags) */
  .task > .pbadge { display: none; }

    grid-column: 1 / -1;
    grid-row: 3;
    min-width: 0;
    max-width: 100%;
    width: 100%;
  }

  /* ── Toast: full width ── */
  .toast {
    left: 12px;
    right: 12px;
    bottom: 16px;
    justify-content: center;
  }

  /* ── Export/JSON header buttons: compact ── */
  .btn { padding: 6px 10px; font-size: 11px; }
  .btn-icon { width: 30px; height: 30px; }
}

══════════════════════════════════════ */
@media (max-width: 480px) {

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let STATE = {};
let activeView = 'overview';
let activeCat = {};

function initState() {
  const saved = localStorage.getItem('mde-multi-state-v2');
  if (saved) { try { STATE = JSON.parse(saved); } catch(e) {} }
  ['csf','ce','soc2','n53'].forEach(fid => {
    if (!STATE[fid]) STATE[fid] = {};
    FW[fid].cats.forEach(cat => {
      cat.tasks.forEach(t => {
        if (!STATE[fid][t.id]) STATE[fid][t.id] = { status:'pending', notes:'' };
      });
    });
  });
}
function save() { localStorage.setItem('mde-multi-state-v2', JSON.stringify(STATE)); }

// ════════════════════════════════════════════
//  COMPUTED
// ════════════════════════════════════════════
function fwStats(fid) {
  const fw = FW[fid];
  const all = fw.cats.flatMap(c => c.tasks);
  const total = all.length;
  const complete = all.filter(t => STATE[fid][t.id]?.status === 'complete').length;
  const progress = all.filter(t => STATE[fid][t.id]?.status === 'progress').length;
  const blocked  = all.filter(t => STATE[fid][t.id]?.status === 'blocked').length;
  const pct = total ? Math.round(complete / total * 100) : 0;
  const hiPri = all.filter(t => t.pri === 'high' && STATE[fid][t.id]?.status !== 'complete').length;
  return { total, complete, progress, blocked, pending: total-complete-progress-blocked, pct, hiPri };
}
function catStats(fid, catId) {
  const cat = FW[fid].cats.find(c => c.id === catId);
  if (!cat) return {};
  const total = cat.tasks.length;
  const complete = cat.tasks.filter(t => STATE[fid][t.id]?.status === 'complete').length;
  const pct = total ? Math.round(complete / total * 100) : 0;
  return { total, complete, pct };
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('mde-theme', isDark ? 'light' : 'dark');
}
function initTheme() {
  const saved = localStorage.getItem('mde-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function setFWColor(color) {
  document.documentElement.style.setProperty('--fw-color', color || '#0078D4');
}

function renderSwitcher() {
  const c = document.getElementById('fwSwitcher');
  const fwList = ['overview','csf','ce','soc2','n53'];
  c.innerHTML = fwList.map(fid => {
    const fw = FW[fid];
    const isActive = fid === activeView;
    const dot = fw.dot || '#888';
    return `<button class="fw-btn${isActive?' active':''}" onclick="switchFW('${fid}')" style="--dot-color:${dot}">
      ${fid !== 'overview' ? `<span class="fw-dot" style="background:${dot}"></span>` : '📊 '}
      ${fw.label}
    </button>`;
  }).join('');
}

function switchFW(fid) {
  activeView = fid;
  const color = FW[fid]?.color;
  setFWColor(color || '#0078D4');
  document.getElementById('jsonBtn').style.background = color || '#0078D4';
  document.getElementById('jsonBtn').style.borderColor = color || '#0078D4';
  document.getElementById('logoIcon').style.background = color ? `linear-gradient(135deg,${color},color-mix(in srgb,${color} 60%,#000))` : '';
  renderSwitcher();
  renderMain();
}

function renderMain() {
  const area = document.getElementById('mainArea');
  if (activeView === 'overview') { area.innerHTML = renderOverviewPage(); return; }
  const fw = FW[activeView];
  if (!fw || !fw.cats) return;
  const defaultCat = activeCat[activeView] || fw.cats[0].id;
  activeCat[activeView] = defaultCat;
  area.innerHTML = renderFWPage(fw);
}

      <td style="color:var(--s-progress);font-family:'JetBrains Mono',monospace">${s.progress}</td>
      <td style="color:var(--s-blocked);font-family:'JetBrains Mono',monospace">${s.blocked}</td>
      <td style="color:var(--p-high);font-family:'JetBrains Mono',monospace">${s.hiPri}</td>
      <td><button class="btn" style="font-size:10.5px;padding:4px 10px" onclick="switchFW('${fid}')">Open →</button></td>
    </tr>`;
  }).join('');

  const grandTotal = fwIds.reduce((s,f)=>s+fwStats(f).total,0);
  const grandDone  = fwIds.reduce((s,f)=>s+fwStats(f).complete,0);

  return `<div class="ov-page">
    <div class="ov-page-title">🛡️ MDE Multi-Framework Audit Dashboard</div>
    <div class="ov-page-sub">Microsoft Defender for Endpoint · MSSP Security Operations · ${grandDone} of ${grandTotal} tasks complete across all frameworks</div>
    <div class="fw-cards">${cards}</div>
    <div class="cross-table-wrap">
      <div class="cross-table-hdr">
        <div class="cross-table-title">Framework Comparison</div>
        <span style="font-size:11px;color:var(--t3)">${grandDone}/${grandTotal} total tasks · ${Math.round(grandDone/grandTotal*100)}% overall</span>
      </div>
      <table class="cross-tbl">
        <thead><tr><th>ID</th><th>Framework</th><th>Progress</th><th>Bar</th><th>Done</th><th>Active</th><th>Blocked</th><th>High Pri</th><th></th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderFWPage(fw) {
  const s = fwStats(fw.id);
  const defaultCat = activeCat[fw.id] || fw.cats[0].id;

  const tabs = `<div class="cat-tabs" id="catTabs-${fw.id}">
    <button class="cat-tab${defaultCat==='__all__'?' active':''}" onclick="switchCat('${fw.id}','__all__',this)">
      All <span class="cat-tab-count">${s.complete}/${s.total}</span>
    </button>
    ${fw.cats.map(cat => {
      const cs = catStats(fw.id, cat.id);
      return `<button class="cat-tab${defaultCat===cat.id?' active':''}" onclick="switchCat('${fw.id}','${cat.id}',this)">
        ${cat.emoji} ${cat.id}
        <span class="cat-tab-count">${cs.complete}/${cs.total}</span>
      </button>`;
    }).join('')}
  </div>`;

  const sections = [`<div class="cat-section${defaultCat==='__all__'?' active':''}" id="cat-${fw.id}-__all__">
    ${fw.cats.map(cat => renderCatBlock(fw, cat)).join('')}
  </div>`];
  fw.cats.forEach(cat => {
    sections.push(`<div class="cat-section${defaultCat===cat.id?' active':''}" id="cat-${fw.id}-${cat.id}">
      ${renderCatBlock(fw, cat)}
    </div>`);
  });

  return `
    <div class="fw-view active" id="fwview-${fw.id}" style="--fw-color:${fw.color}">
      <div class="fw-view-header">
        <div>
          <div class="fw-view-tag" style="color:${fw.color};background:color-mix(in srgb,${fw.color} 12%,transparent)">${fw.emoji} ${fw.shortName} · ${fw.label}</div>
          <div class="fw-view-name">${fw.label}</div>
          <div class="fw-view-desc">${fw.desc}</div>
        </div>
        <div class="fw-view-stats">
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:${fw.color}">${s.pct}%</div><div class="fw-stat-pill-label">Complete</div></div>
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:var(--s-complete)">${s.complete}</div><div class="fw-stat-pill-label">Done</div></div>
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:var(--s-progress)">${s.progress}</div><div class="fw-stat-pill-label">Active</div></div>
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:var(--s-blocked)">${s.blocked}</div><div class="fw-stat-pill-label">Blocked</div></div>
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:var(--p-high)">${s.hiPri}</div><div class="fw-stat-pill-label">High Pri</div></div>
          <div class="fw-stat-pill"><div class="fw-stat-pill-val" style="color:var(--t2)">${s.total}</div><div class="fw-stat-pill-label">Total</div></div>
        </div>
      </div>
      ${tabs}
      <div id="catSections-${fw.id}">${sections.join('')}</div>
    </div>`;
}

function renderCatBlock(fw, cat) {
  const cs = catStats(fw.id, cat.id);
  return `<div style="--fw-color:${fw.color}">
    <div class="cat-hdr">
      <div>
        <div class="cat-hdr-label" style="color:${fw.color}">${cat.emoji} ${cat.id} · ${cat.name}</div>
        <div class="cat-hdr-title">${cat.name.charAt(0)+cat.name.slice(1).toLowerCase()}</div>
        <div class="cat-hdr-desc">${cat.desc}</div>
      </div>
      <div class="cat-hdr-pct">
        <div class="cat-pct-val" style="color:${fw.color}">${cs.pct}%</div>
        <div class="cat-pct-label">${cs.complete}/${cs.total}</div>
      </div>
    </div>
    <div class="tasks-list" style="--fw-color:${fw.color}">
      ${cat.tasks.map(t => renderTask(fw.id, t, fw.color)).join('')}
    </div>
  </div>`;
}

function renderTask(fid, t, color) {
  const s = STATE[fid][t.id] || { status:'pending', notes:'' };
  const done = s.status === 'complete';
  return `<div class="task${done?' done':''}" id="tr-${fid}-${t.id}" style="--fw-color:${color}">
    <input type="checkbox" class="task-cb" ${done?'checked':''} onchange="toggleDone('${fid}','${t.id}',this)"/>
    <div class="task-body">
      <div class="task-name">${t.name}</div>
      <div class="task-tags">
        <span class="task-ref">${t.ref}</span>
        <span class="pbadge pb-${t.pri}">${t.pri}</span>
      </div>
      <div class="task-desc">${t.desc}</div>
    </div>
    <select class="task-status ss-${s.status}" onchange="updateStatus('${fid}','${t.id}',this)">
      <option value="pending"  ${s.status==='pending' ?'selected':''}>⬜ Not Started</option>
      <option value="progress" ${s.status==='progress'?'selected':''}>🟡 In Progress</option>
      <option value="complete" ${s.status==='complete'?'selected':''}>✅ Complete</option>
      <option value="blocked"  ${s.status==='blocked' ?'selected':''}>🔴 Blocked</option>
    </select>
    <span class="pbadge pb-${t.pri}" style="align-self:start">${t.pri.toUpperCase()}</span>
    <textarea class="task-notes" rows="2" placeholder="Notes / ticket ref…" oninput="updateNotes('${fid}','${t.id}',this)">${s.notes||''}</textarea>
  </div>`;
}

// ════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════
function switchCat(fid, catId, el) {
  activeCat[fid] = catId;
  document.querySelectorAll(`#catTabs-${fid} .cat-tab`).forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll(`#catSections-${fid} .cat-section`).forEach(s => s.classList.remove('active'));
  document.getElementById(`cat-${fid}-${catId}`)?.classList.add('active');
}

function toggleDone(fid, tid, el) {
  const status = el.checked ? 'complete' : 'pending';
  STATE[fid][tid].status = status;
  save();
  const row = document.getElementById(`tr-${fid}-${tid}`);
  if (row) {
    row.classList.toggle('done', status === 'complete');
    const sel = row.querySelector('.task-status');
    if (sel) { sel.value = status; sel.className = `task-status ss-${status}`; }
  }
  refreshStats(fid);
}

function updateStatus(fid, tid, sel) {
  const status = sel.value;
  STATE[fid][tid].status = status;
  save();
  sel.className = `task-status ss-${status}`;
  const row = document.getElementById(`tr-${fid}-${tid}`);
  if (row) {
    row.classList.toggle('done', status === 'complete');
    const cb = row.querySelector('.task-cb');
    if (cb) cb.checked = status === 'complete';
  }
  refreshStats(fid);
}

function updateNotes(fid, tid, el) {
  STATE[fid][tid].notes = el.value;
  save();
}

function refreshStats(fid) {
  const s = fwStats(fid);
  // Update header stat pills
  const view = document.getElementById(`fwview-${fid}`);
  if (view) {
    const pills = view.querySelectorAll('.fw-stat-pill-val');
    if (pills[0]) pills[0].textContent = s.pct + '%';
    if (pills[1]) pills[1].textContent = s.complete;
    if (pills[2]) pills[2].textContent = s.progress;
    if (pills[3]) pills[3].textContent = s.blocked;
    if (pills[4]) pills[4].textContent = s.hiPri;
  }
  // Update cat tab counts for this fw
  FW[fid].cats.forEach(cat => {
    const cs = catStats(fid, cat.id);
    const tab = document.querySelector(`#catTabs-${fid} [onclick*="'${cat.id}'"] .cat-tab-count`);
    if (tab) tab.textContent = `${cs.complete}/${cs.total}`;
    // Update all-tab count
    const allTab = document.querySelector(`#catTabs-${fid} [onclick*="__all__"] .cat-tab-count`);
    if (allTab) allTab.textContent = `${s.complete}/${s.total}`;
  });
}

// ════════════════════════════════════════════
//  EXPORTS
// ════════════════════════════════════════════
function buildExportData(fid) {
  const ids = fid ? [fid] : ['csf','ce','soc2','n53'];
  return {
    meta: {
      tool: 'MDE Multi-Framework Audit Tracker',
      version: '2.0',
      exported: new Date().toISOString(),
      platform: 'Microsoft Defender for Endpoint',
      frameworks: ids.map(f => FW[f].label)
    },
    summary: Object.fromEntries(ids.map(f => [f, fwStats(f)])),
    frameworks: ids.map(fid => ({
      id: fid,
      name: FW[fid].label,
      color: FW[fid].color,
      stats: fwStats(fid),
      categories: FW[fid].cats.map(cat => ({
        id: cat.id,
        name: cat.name,
        tasks: cat.tasks.map(t => ({
          id: t.id,
          name: t.name,
          reference: t.ref,
          priority: t.pri,
          description: t.desc,
          status: STATE[fid][t.id]?.status || 'pending',
          notes: STATE[fid][t.id]?.notes || ''
        }))
      }))
    }))
  };
}

function doExportJSON(fid) {
  const data = buildExportData(fid);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = fid ? `mde-${fid}-config.json` : 'mde-all-frameworks-config.json';
  a.click(); URL.revokeObjectURL(url);
  closeOverlay('exportOverlay'); closeOverlay('jsonOverlay');
  showToast('✅ JSON downloaded');
}

function doExportCSV(fid) {
  const ids = fid ? [fid] : ['csf','ce','soc2','n53'];
  const rows = [['Framework','Category','Task ID','Task Name','Reference','Priority','Status','Notes']];
  ids.forEach(fid => {
    FW[fid].cats.forEach(cat => {
      cat.tasks.forEach(t => {
        const s = STATE[fid][t.id] || {};
        rows.push([FW[fid].shortName, cat.id, t.id, `"${t.name}"`, t.ref, t.pri, s.status||'pending', `"${(s.notes||'').replace(/"/g,'""')}"`]);
      });
    });
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'mde-audit-tracker.csv'; a.click(); URL.revokeObjectURL(url);
  closeOverlay('exportOverlay');
  showToast('✅ CSV exported');
}

function doExportHTML(fid) {
  const ids = fid ? [fid] : ['csf','ce','soc2','n53'];
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const bg = isDark ? '#080c12' : '#f0f4f8';
  const cardBg = isDark ? '#131c2e' : '#ffffff';
  const textColor = isDark ? '#e8eef8' : '#0f172a';
  const borderColor = isDark ? '#243047' : '#d0d9e8';
  const mutedColor = isDark ? '#4e6280' : '#94a3b8';

  let body = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<title>MDE Multi-Framework Audit Report</title>
<style>
  body{font-family:system-ui,sans-serif;background:${bg};color:${textColor};margin:0;padding:32px;font-size:13px}
  h1{font-size:22px;margin-bottom:4px}
  .meta{font-size:11px;color:${mutedColor};margin-bottom:24px}
  .summary{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:28px}
  .sum-card{background:${cardBg};border:1px solid ${borderColor};border-radius:8px;padding:14px;min-width:110px;border-top:3px solid var(--c)}
  .sum-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:${mutedColor};margin-bottom:5px}
  .sum-val{font-size:20px;font-weight:700;color:var(--c)}
  .fw-block{margin-bottom:36px}
  .fw-title{font-size:15px;font-weight:700;padding:12px 14px;border-radius:6px 6px 0 0;color:#fff;margin:0}
  table{width:100%;border-collapse:collapse;background:${cardBg};border:1px solid ${borderColor};border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:0}
  th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:${mutedColor};border-bottom:1px solid ${borderColor};background:color-mix(in srgb,${cardBg} 80%,${bg})}
  td{padding:9px 12px;font-size:11.5px;border-bottom:1px solid ${borderColor};vertical-align:top}
  tr:last-child td{border-bottom:none}
  .done td{opacity:.65}
  .s-complete{color:#10b981;font-weight:600} .s-progress{color:#f59e0b;font-weight:600}
  .s-blocked{color:#ef4444;font-weight:600} .s-pending{color:${mutedColor}}
  .p-high{color:#ef4444;font-weight:700} .p-med{color:#f59e0b;font-weight:700} .p-low{color:#10b981;font-weight:700}
  code{font-family:monospace;font-size:10px;background:${bg};padding:1px 5px;border-radius:3px;border:1px solid ${borderColor}}
</style></head><body>
  <h1>🛡️ MDE Multi-Framework Audit Report</h1>
  <div class="meta">Generated: ${new Date().toLocaleString()} | Platform: Microsoft Defender for Endpoint | MSSP</div>
  <div class="summary">`;

  ids.forEach(fid => {
    const s = fwStats(fid);
    body += `<div class="sum-card" style="--c:${FW[fid].color}"><div class="sum-label">${FW[fid].shortName}</div><div class="sum-val">${s.pct}%</div><div style="font-size:10px;color:${mutedColor}">${s.complete}/${s.total} done</div></div>`;
  });
  body += `</div>`;

  ids.forEach(fid => {
    const fw = FW[fid];
    body += `<div class="fw-block"><div class="fw-title" style="background:${fw.color}">${fw.emoji} ${fw.shortName} — ${fw.label}</div>
    <table><tr><th>Category</th><th>Task</th><th>Ref</th><th>Priority</th><th>Status</th><th>Notes</th></tr>`;
    fw.cats.forEach(cat => {
      cat.tasks.forEach((t, i) => {
        const s = STATE[fid][t.id] || {};
        const st = s.status || 'pending';
        body += `<tr class="${st==='complete'?'done':''}">
          ${i===0?`<td rowspan="${cat.tasks.length}" style="font-weight:700;vertical-align:top;padding-top:11px">${cat.emoji} ${cat.id}</td>`:''}
          <td><strong>${t.name}</strong><br/><span style="font-size:10.5px;color:${mutedColor}">${t.desc}</span></td>
          <td><code>${t.ref}</code></td>
          <td class="p-${t.pri}">${t.pri.toUpperCase()}</td>
          <td class="s-${st}">${st.charAt(0).toUpperCase()+st.slice(1)}</td>
          <td>${s.notes||'—'}</td>
        </tr>`;
      });
    });
    body += `</table></div>`;
  });
  body += `</body></html>`;
  const blob = new Blob([body], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'mde-audit-report.html'; a.click(); URL.revokeObjectURL(url);
  closeOverlay('exportOverlay');
  showToast('✅ HTML report exported');
}

// ════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════
function openExport() { document.getElementById('exportOverlay').classList.add('open'); }
function openJSON() {
  const fid = activeView !== 'overview' ? activeView : null;
  const data = buildExportData(fid);
  document.getElementById('jsonPre').textContent = JSON.stringify(data, null, 2);
  document.getElementById('jsonOverlay').classList.add('open');
}
function copyJSON() {
  navigator.clipboard.writeText(document.getElementById('jsonPre').textContent)
    .then(() => showToast('📋 Copied to clipboard'));
}
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('overlay')) e.target.classList.remove('open');
});

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
initTheme();
initState();
setFWColor('#0078D4');
renderSwitcher();
renderMain();
</script>
</body>
</html>
